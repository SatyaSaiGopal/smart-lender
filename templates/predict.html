{% extends 'base.html' %}

{% block extra_css %}
<style>
    .app-container {
        position: relative;
        max-width: 900px;
        margin: 0 auto;
    }
    .form-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 2rem;
    }
    @media (max-width: 768px) {
        .form-grid { grid-template-columns: 1fr; }
    }
    .input-group {
        position: relative;
        margin-bottom: 1.5rem;
    }
    .input-group input, .input-group select {
        width: 100%;
        padding: 1rem 0;
        background: transparent;
        border: none;
        border-bottom: 2px solid var(--glass-border);
        color: white;
        font-size: 1rem;
        font-family: var(--font-body);
        transition: all 0.3s ease;
        outline: none;
    }
    .input-group input:focus, .input-group select:focus {
        border-bottom-color: var(--cyan);
    }
    .input-group label {
        position: absolute;
        top: 1rem;
        left: 0;
        color: var(--text-muted);
        pointer-events: none;
        transition: all 0.3s ease;
    }
    .input-group input:focus ~ label, .input-group input:valid ~ label,
    .input-group select:focus ~ label, .input-group select:valid ~ label {
        top: -0.5rem;
        font-size: 0.8rem;
        color: var(--cyan);
    }
    .input-group select option {
        background: var(--bg-dark);
        color: white;
    }
    
    #prediction-overlay {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(3, 7, 18, 0.95);
        backdrop-filter: blur(10px);
        border-radius: 24px;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        opacity: 0; pointer-events: none; transition: opacity 0.4s; z-index: 10;
    }
    #prediction-overlay.active { opacity: 1; pointer-events: all; }
    
    .scanner-ring {
        width: 120px; height: 120px; border: 3px solid transparent;
        border-top-color: var(--cyan); border-right-color: var(--primary);
        border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 2rem; position: relative;
    }
    .scanner-ring::before {
        content: ''; position: absolute; top: 10px; left: 10px; right: 10px; bottom: 10px;
        border: 3px solid transparent; border-bottom-color: var(--purple); border-left-color: var(--gold);
        border-radius: 50%; animation: spin 2s linear infinite reverse;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    #loading-text { font-family: var(--font-head); font-size: 1.5rem; font-weight: 600; color: var(--cyan); }
</style>
{% endblock %}

{% block content %}
<section id="application">
    <div class="container">
        <div class="section-header">
            <span class="section-subtitle">Interactive Demo</span>
            <h2 class="hero-title" style="font-size: 3rem;">Run Prediction</h2>
        </div>

        <div class="app-container glass-card gs-reveal">
            <!-- Overlay for Loading -->
            <div id="prediction-overlay">
                <div id="loading-state" style="text-align: center;">
                    <div class="scanner-ring"></div>
                    <div id="loading-text">Initializing AI Engine...</div>
                    <p class="text-muted" style="margin-top: 1rem; font-family: monospace;" id="loading-log">Connecting to inference server [OK]</p>
                </div>
            </div>

            <!-- Form UI -->
            <form id="loan-form" action="{{ url_for('submit') }}" method="POST">
                <div class="form-grid">
                    <div class="input-group">
                        <select name="Gender" required>
                            <option value="" disabled selected></option>
                            <option value="1">Male</option>
                            <option value="0">Female</option>
                        </select>
                        <label>Gender</label>
                    </div>
                    <div class="input-group">
                        <select name="Married" required>
                            <option value="" disabled selected></option>
                            <option value="1">Yes</option>
                            <option value="0">No</option>
                        </select>
                        <label>Married</label>
                    </div>
                    <div class="input-group">
                        <select name="Dependents" required>
                            <option value="" disabled selected></option>
                            <option value="0">0</option>
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3+</option>
                        </select>
                        <label>Dependents</label>
                    </div>
                    <div class="input-group">
                        <select name="Education" required>
                            <option value="" disabled selected></option>
                            <option value="1">Graduate</option>
                            <option value="0">Not Graduate</option>
                        </select>
                        <label>Education</label>
                    </div>
                    <div class="input-group">
                        <select name="Self_Employed" required>
                            <option value="" disabled selected></option>
                            <option value="1">Yes</option>
                            <option value="0">No</option>
                        </select>
                        <label>Self Employed</label>
                    </div>
                    <div class="input-group">
                        <input type="number" name="ApplicantIncome" required min="0">
                        <label>Applicant Income ($)</label>
                    </div>
                    <div class="input-group">
                        <input type="number" name="CoapplicantIncome" required min="0" value="0">
                        <label>Co-Applicant Income ($)</label>
                    </div>
                    <div class="input-group">
                        <input type="number" name="LoanAmount" required min="0">
                        <label>Loan Amount ($)</label>
                    </div>
                    <div class="input-group">
                        <input type="number" name="Loan_Amount_Term" required min="12" value="360">
                        <label>Loan Term (Days)</label>
                    </div>
                    <div class="input-group">
                        <select name="Credit_History" required>
                            <option value="" disabled selected></option>
                            <option value="1">Good (1)</option>
                            <option value="0">Bad (0)</option>
                        </select>
                        <label>Credit History</label>
                    </div>
                    <div class="input-group" style="grid-column: 1 / -1;">
                        <select name="Property_Area" required>
                            <option value="" disabled selected></option>
                            <option value="2">Urban</option>
                            <option value="1">Semi-Urban</option>
                            <option value="0">Rural</option>
                        </select>
                        <label>Property Area</label>
                    </div>
                </div>
                <div class="text-center mt-4">
                    <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 1.2rem;">Execute Prediction Model</button>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}

{% block extra_js %}
<script>
    document.querySelectorAll('.gs-reveal').forEach((el) => {
        gsap.from(el, { scrollTrigger: { trigger: el, start: 'top 85%' }, y: 50, opacity: 0, duration: 0.8, ease: 'power3.out' });
    });

    const form = document.getElementById('loan-form');
    const overlay = document.getElementById('prediction-overlay');
    const loadLog = document.getElementById('loading-log');
    
    const logs = [
        "Parsing input features...",
        "Applying StandardScaler...",
        "Loading XGBoost weights...",
        "Running inference tree...",
        "Calculating probability...",
        "Submitting prediction..."
    ];

    form.addEventListener('submit', (e) => {
        e.preventDefault();
        overlay.classList.add('active');
        
        let logIndex = 0;
        const logInterval = setInterval(() => {
            if (logIndex < logs.length) {
                loadLog.innerText = logs[logIndex];
                logIndex++;
            }
        }, 500);

        setTimeout(() => {
            clearInterval(logInterval);
            form.submit(); // Actually submit the form to /submit
        }, 3000);
    });
</script>
{% endblock %}
